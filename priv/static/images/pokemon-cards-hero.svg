  <rect x="320" y="30" width="160" height="220" rx="12" fill="#c8ccba" stroke="#a3a893" stroke-width="2"/>
  <rect x="460" y="40" width="160" height="220" rx="12" fill="#bcc0ac" stroke="#a3a893" stroke-width="2" transform="rotate(8 540 150)"/>
